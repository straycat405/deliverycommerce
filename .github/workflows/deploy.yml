name: CI/CD

# main 브랜치에 push 되거나 PR이 열릴 때 실행 (트리거 설정)
on:
  push:
    branches: [ main ] # main 브랜치로 push 될 때 (테스트 + 배포 모두 실행)
  pull_request:
    branches: [ main, develop ] # main, develop 브랜치로 PR이 열릴 때 ( 테스트만 실행 - deploy job에 if 조건으로 제한 )

jobs:
  # ──────────────────────────────────────────
  # 1단계: 테스트 (PR / push 모두 실행)
  # ──────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest # 러너 설정 (워크플로우 실행 가상머신 - Github가 관리하는 vm - 매 실행마다 완전 초기화)

    # application-test.yaml 이 localhost:6379 Redis를 바라보므로
    # GitHub Actions 컨테이너 서비스로 Redis를 함께 띄움
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379 # 테스트 코드가 localhost:6379로 접근할수 있도록 포트 바인딩

    steps:
      - name: 소스 체크아웃 # Github repo의 소스 코드를 러너 (VM)의 작업 디렉토리로 내려받음 , 워크플로우 첫단계
        uses: actions/checkout@v4 # 액션 버전은 @V4

      - name: Java 17 세팅 # 초기화된 Ubuntu VM에는 Java 없으므로 JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Eclipse Temirun 빌드 사용 (오픈소스, 범용판)

      # Gradle 의존성 캐시 (빌드 속도 최적화)
      # 캐시 없이 반복 실행시 매번 1~2분 소요
      # actions/cache를 통해 key로 지정한 파일들의 해시값을 키로 삼아서 build.gradle이 수정되지 않으면 기존 의존성 그대로 사용
      # hashFiles('**/*.gradle*', ...) -> gradle 설정 변경되면 해시가 바뀌어 새로 다운로드
      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Linux 러너에서 ./gradlew 명령 실행 위해서는 권한 필요, chmod +x로 이를 부여
      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # ./gradlew test로 전체 테스트 실행
      # SPRING_PROFILES_ACTIVE: test를 환경변수로 주입해서 application-test.yaml 프로파일 활성화
      # application-test.yaml 프로파일 사용 (H2 인메모리 DB + 로컬 Redis)
      # 테스트 성공시 deploy job 진행
      # 테스트 실패시 워크플로우 중단 , 배포 차단
      - name: 테스트 실행
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ──────────────────────────────────────────
  # 2단계: EC2 배포 (main push 시에만 실행)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test # 테스트 실패시 배포 차단
    runs-on: ubuntu-latest
    timeout-minutes: 10 # SSH hang 등 무한 대기 방지
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' #main브랜치인지 and 실제 PUSH 검사

    # 소스 체크아웃 ~ gradlew 권한 부여 까지는 test job과 동일하게 반복
    # test / deploy job은 서로 독립된 러너 VM에서 실행하므로 각자 환경 설정 필요

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 세팅
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # 테스트는 이미 위에서 통과했으므로 -x test 로 스킵
      # jar 태스크와 달리 모든 의존성을 하나의 실행 가능한 JAR파일로 패키징 (Uber JAR / Fat JAR)
      - name: JAR 빌드
        run: ./gradlew bootJar -x test

      # SCP 전송 전에 기존 프로세스 종료 + 구버전 JAR 삭제
      # (SCP 후에 삭제하면 새로 올린 JAR까지 지워지므로 순서 신경쓸것)
      - name: EC2 준비 (프로세스 종료 + 구버전 JAR 삭제)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            pkill -f 'deliverycommerce' || true
            sleep 2
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/app
            rm -f /home/${{ secrets.EC2_USERNAME }}/app/*.jar

      # build/libs/ 안의 JAR 파일을 EC2 ~/app/ 디렉토리로 전송
      - name: JAR → EC2 전송 (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"
          strip_components: 2  # build/libs 경로를 제거하고 ~/app/*.jar 로 저장

      # 새 JAR 실행
      - name: EC2 앱 시작 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/app

            # ls 로 JAR 이름을 확정해서 *.jar 글로빙 오류 방지
            APP_JAR=$(ls *.jar | head -n 1)

            # nohup: SSH 세션이 끊겨도 프로세스 유지
            # 환경변수는 GitHub Secrets 에서 주입
            nohup java \
              -Dspring.profiles.active=prod \
              -DREDIS_HOST=${{ secrets.REDIS_HOST }} \
              -DREDIS_PORT=${{ secrets.REDIS_PORT }} \
              -DJWT_SECRET=${{ secrets.JWT_SECRET }} \
              -DDB_HOST=${{ secrets.DB_HOST }} \
              -DDB_PORT=${{ secrets.DB_PORT }} \
              -DDB_NAME=${{ secrets.DB_NAME }} \
              -DDB_USERNAME=${{ secrets.DB_USERNAME }} \
              -DDB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -DGOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} \
              -jar "$APP_JAR" \
              > app.log 2>&1 &

            echo "배포 완료. JAR: $APP_JAR / PID: $!"
