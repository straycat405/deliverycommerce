name: CI/CD

# main 브랜치에 push 되거나 PR이 열릴 때 실행 (트리거 설정)
on:
  push:
    branches: [ main ] # main 브랜치로 push 될 때 (테스트 + 배포 모두 실행)
  pull_request:
    branches: [ main, develop ] # main, develop 브랜치로 PR이 열릴 때 ( 테스트만 실행 - deploy job에 if 조건으로 제한 )

jobs:
  # ──────────────────────────────────────────
  # 1단계: 테스트 (PR / push 모두 실행)
  # ──────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest # 러너 설정 (워크플로우 실행 가상머신 - Github가 관리하는 vm - 매 실행마다 완전 초기화)

    # application-test.yaml 이 localhost:6379 Redis를 바라보므로
    # GitHub Actions 컨테이너 서비스로 Redis를 함께 띄움
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379 # 테스트 코드가 localhost:6379로 접근할수 있도록 포트 바인딩

    steps:
      - name: 소스 체크아웃 # Github repo의 소스 코드를 러너 (VM)의 작업 디렉토리로 내려받음 , 워크플로우 첫단계
        uses: actions/checkout@v4 # 액션 버전은 @V4

      - name: Java 17 세팅 # 초기화된 Ubuntu VM에는 Java 없으므로 JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Eclipse Temirun 빌드 사용 (오픈소스, 범용판)

      # Gradle 의존성 캐시 (빌드 속도 최적화)
      # 캐시 없이 반복 실행시 매번 1~2분 소요
      # actions/cache를 통해 key로 지정한 파일들의 해시값을 키로 삼아서 build.gradle이 수정되지 않으면 기존 의존성 그대로 사용
      # hashFiles('**/*.gradle*', ...) -> gradle 설정 변경되면 해시가 바뀌어 새로 다운로드
      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Linux 러너에서 ./gradlew 명령 실행 위해서는 권한 필요, chmod +x로 이를 부여
      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # ./gradlew test로 전체 테스트 실행
      # SPRING_PROFILES_ACTIVE: test를 환경변수로 주입해서 application-test.yaml 프로파일 활성화
      # application-test.yaml 프로파일 사용 (H2 인메모리 DB + 로컬 Redis)
      # 테스트 성공시 deploy job 진행
      # 테스트 실패시 워크플로우 중단 , 배포 차단
      - name: 테스트 실행
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test

  # ──────────────────────────────────────────
  # 2단계: Docker 이미지 빌드 & Hub push + EC2 배포 (main push 시에만 실행)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test # 테스트 실패시 배포 차단
    runs-on: ubuntu-latest
    timeout-minutes: 10 # SSH hang 등 무한 대기 방지
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # main 브랜치인지 and 실제 PUSH 검사

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 세팅
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      # 테스트는 이미 위에서 통과했으므로 -x test 로 스킵
      # jar 태스크와 달리 모든 의존성을 하나의 실행 가능한 JAR파일로 패키징 (Uber JAR / Fat JAR)
      - name: JAR 빌드
        run: ./gradlew bootJar -x test

      # Docker Hub 로그인
      # DOCKERHUB_USERNAME, DOCKERHUB_TOKEN 은 GitHub Secrets 에 등록 필요
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 이미지 빌드 후 Docker Hub push
      # latest 태그: EC2에서 항상 최신 이미지를 pull 하기 위해 사용
      # sha 태그: 특정 커밋 시점으로 롤백할 때 사용 가능
      - name: Docker 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/deliverycommerce:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/deliverycommerce:${{ github.sha }}

      # EC2 SSH 접속 → 최신 이미지 pull → 앱 컨테이너 재시작
      - name: EC2 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/app

            # Docker Hub에서 최신 앱 이미지 pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/deliverycommerce:latest

            # 환경변수 파일 갱신 (.env 파일로 docker-compose에 주입)
            cat > .env << 'EOF'
            SPRING_PROFILES_ACTIVE=prod
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            EOF

            # 앱 컨테이너만 재시작 (DB/Redis 컨테이너는 유지)
            docker-compose up -d --no-deps app

            echo "배포 완료: ${{ github.sha }}"
