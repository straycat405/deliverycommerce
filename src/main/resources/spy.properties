# P6Spy SQL Logging Configuration

# Use SLF4J logger
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# Custom log format
logMessageFormat=com.babjo.deliverycommerce.global.common.logging.P6spyFormatter

# Log all queries (0ms threshold = log everything)
executionThreshold=0

# Exclude non-SQL log categories
excludecategories=info,debug,result,resultset


# Example output:
# 16:46:20.123 [http-nio-8080-exec-1] INFO p6spy - select * from p_user where username='user1234'